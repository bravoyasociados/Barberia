<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King's Barber</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<!-- Firebase (VERSIÓN COMPATIBLE) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: #fff;
}
header {
  background: #000;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}
.container {
  padding: 15px;
}
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}
.services {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.service-btn {
  padding: 15px;
  border-radius: 10px;
  background: #1c1c1c;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
}
.service-btn.active {
  border: 2px solid #00c853;
  background: #263238;
}
button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #00c853;
  color: #000;
  font-weight: bold;
}
.summary {
  background: #121212;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}
.item {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>💈 King's Barber</header>

<div class="container">

<input type="text" id="cliente" placeholder="Nombre del cliente">

<div class="services">
  <div class="service-btn" onclick="toggle(this,'Corte',100)">Corte</div>
  <div class="service-btn" onclick="toggle(this,'Barba',20)">Barba</div>
  <div class="service-btn" onclick="toggle(this,'Ceja',20)">Ceja</div>
  <div class="service-btn" onclick="toggle(this,'Facial',50)">Facial</div>
</div>

<input type="number" id="monto" placeholder="Total">

<button onclick="guardar()">Guardar Servicio</button>

<div class="summary">
  💰 Hoy: $<span id="hoy">0</span><br>
  📅 Semana: $<span id="semana">0</span>
</div>

<div class="summary">
  <h3>📄 Reporte</h3>
  <input type="date" id="fechaInicio">
  <input type="date" id="fechaFin">
  <button onclick="generarPDF()">Generar PDF</button>
</div>

<div id="historial"></div>

</div>

<script>
// 🔥 TU CONFIG YA INTEGRADA
const firebaseConfig = {
  apiKey: "AIzaSyCSF7dc0cy3B-hSaFTYAwU-gNc0o12JTG0",
  authDomain: "barberia-pro-3ca72.firebaseapp.com",
  projectId: "barberia-pro-3ca72",
  storageBucket: "barberia-pro-3ca72.firebasestorage.app",
  messagingSenderId: "367164635109",
  appId: "1:367164635109:web:8403bb5f804fffe2c6210c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// VARIABLES
let seleccionados = [];
let totalAuto = 0;

// SERVICIOS
function toggle(el, servicio, precio) {
  el.classList.toggle("active");

  if (seleccionados.includes(servicio)) {
    seleccionados = seleccionados.filter(s => s !== servicio);
    totalAuto -= precio;
  } else {
    seleccionados.push(servicio);
    totalAuto += precio;
  }

  document.getElementById("monto").value = totalAuto;
}

// GUARDAR EN FIREBASE
async function guardar() {
  let cliente = document.getElementById("cliente").value;
  let monto = document.getElementById("monto").value;

  if (!cliente || seleccionados.length === 0 || !monto) {
    alert("Completa los datos");
    return;
  }

  let ahora = new Date();

  await db.collection("cortes").add({
    cliente,
    servicios: [...seleccionados],
    monto: parseFloat(monto),
    fecha: ahora.toISOString()
  });

  document.getElementById("cliente").value = "";
  document.getElementById("monto").value = "";
  seleccionados = [];
  totalAuto = 0;

  document.querySelectorAll(".service-btn")
    .forEach(btn => btn.classList.remove("active"));
}

// UTILIDADES
function mismoDia(f1, f2) {
  return f1.toDateString() === f2.toDateString();
}

function mismaSemana(f1, f2) {
  let oneJan = new Date(f1.getFullYear(),0,1);
  let w1 = Math.ceil((((f1 - oneJan) / 86400000) + oneJan.getDay()+1)/7);
  let w2 = Math.ceil((((f2 - oneJan) / 86400000) + oneJan.getDay()+1)/7);
  return w1 === w2 && f1.getFullYear() === f2.getFullYear();
}

// 🔄 TIEMPO REAL
db.collection("cortes").orderBy("fecha", "desc")
.onSnapshot(snapshot => {

  let hoy = new Date();
  let totalHoy = 0;
  let totalSemana = 0;

  let cont = document.getElementById("historial");
  cont.innerHTML = "";

  snapshot.forEach(doc => {
    let r = doc.data();
    let fecha = new Date(r.fecha);

    if (mismoDia(fecha, hoy)) totalHoy += r.monto;
    if (mismaSemana(fecha, hoy)) totalSemana += r.monto;

    if (!mismoDia(fecha, hoy)) return;

    cont.innerHTML += `
      <div class="item">
        <b>${r.cliente}</b><br>
        💈 ${r.servicios.join(", ")}<br>
        💰 $${r.monto}<br>
        ⏰ ${fecha.toLocaleTimeString()}
      </div>
    `;
  });

  document.getElementById("hoy").textContent = totalHoy;
  document.getElementById("semana").textContent = totalSemana;
});

// 📄 PDF
async function generarPDF() {
  const { jsPDF } = window.jspdf;

  let inicio = new Date(document.getElementById("fechaInicio").value);
  let fin = new Date(document.getElementById("fechaFin").value);

  if (!inicio || !fin) {
    alert("Selecciona fechas");
    return;
  }

  let snapshot = await db.collection("cortes").get();

  let filtrados = [];
  snapshot.forEach(doc => {
    let r = doc.data();
    let fecha = new Date(r.fecha);

    if (fecha >= inicio && fecha <= fin) {
      filtrados.push(r);
    }
  });

  let docPDF = new jsPDF();
  let y = 10;
  let total = 0;

  docPDF.text("Reporte Barbería", 10, y);
  y += 10;

  filtrados.forEach(r => {
    let fecha = new Date(r.fecha);

    let texto = `${fecha.toLocaleDateString()} ${fecha.toLocaleTimeString()}
${r.cliente}
${r.servicios.join(", ")}
$${r.monto}`;

    docPDF.text(texto, 10, y);
    y += 20;

    total += r.monto;

    if (y > 270) {
      docPDF.addPage();
      y = 10;
    }
  });

  y += 10;
  docPDF.text(`TOTAL: $${total}`, 10, y);

  docPDF.save("reporte-barberia.pdf");
}

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
