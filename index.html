<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbería PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<!-- Firebase COMPAT -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: #fff;
}
header {
  background: #000;
  padding: 15px;
  text-align: center;
}
.container {
  padding: 15px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}
.services {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.service-btn {
  padding: 15px;
  background: #1c1c1c;
  cursor: pointer;
  text-align: center;
}
.service-btn.active {
  background: #00c853;
  color: #000;
}
button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  background: #00c853;
  border: none;
}
.item {
  background: #1a1a1a;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>💈 Barbería PRO</header>

<div class="container">

<input type="text" id="cliente" placeholder="Nombre del cliente">

<div class="services">
  <div class="service-btn" onclick="toggle(this,'Corte',100)">Corte</div>
  <div class="service-btn" onclick="toggle(this,'Barba',80)">Barba</div>
  <div class="service-btn" onclick="toggle(this,'Greca',50)">Grecas</div>
  <div class="service-btn" onclick="toggle(this,'Navaja',60)">Navaja</div>
</div>

<input type="number" id="monto" placeholder="Total">

<button onclick="guardar()">Guardar</button>

<div>
💰 Hoy: $<span id="hoy">0</span><br>
📅 Semana: $<span id="semana">0</span>
</div>

<div>
<h3>PDF</h3>
<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">
<button onclick="generarPDF()">Generar PDF</button>
</div>

<div id="historial"></div>

</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCSF7dc0cy3B-hSaFTYAwU-gNc0o12JTG0",
  authDomain: "barberia-pro-3ca72.firebaseapp.com",
  projectId: "barberia-pro-3ca72",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// VARIABLES
let seleccionados = [];
let totalAuto = 0;

// SERVICIOS
function toggle(el, servicio, precio) {
  el.classList.toggle("active");

  if (seleccionados.includes(servicio)) {
    seleccionados = seleccionados.filter(s => s !== servicio);
    totalAuto -= precio;
  } else {
    seleccionados.push(servicio);
    totalAuto += precio;
  }

  document.getElementById("monto").value = totalAuto;
}

// 🔥 GUARDAR CORREGIDO
async function guardar() {
  try {
    let cliente = document.getElementById("cliente").value;
    let monto = document.getElementById("monto").value;

    if (!cliente || seleccionados.length === 0 || !monto) {
      alert("Completa los datos");
      return;
    }

    let data = {
      cliente,
      servicios: [...seleccionados],
      monto: parseFloat(monto),
      fecha: new Date().toISOString()
    };

    console.log("Enviando a Firebase:", data);

    await db.collection("cortes").add(data);

    alert("Guardado correctamente ✅");

    document.getElementById("cliente").value = "";
    document.getElementById("monto").value = "";
    seleccionados = [];
    totalAuto = 0;

    document.querySelectorAll(".service-btn")
      .forEach(btn => btn.classList.remove("active"));

  } catch (error) {
    console.error("ERROR FIREBASE:", error);
    alert("Error al guardar ❌ (revisa consola)");
  }
}

// 🔄 TIEMPO REAL
db.collection("cortes").orderBy("fecha", "desc")
.onSnapshot(snapshot => {

  let hoy = new Date();
  let totalHoy = 0;
  let totalSemana = 0;

  let cont = document.getElementById("historial");
  cont.innerHTML = "";

  snapshot.forEach(doc => {
    let r = doc.data();
    let fecha = new Date(r.fecha);

    if (fecha.toDateString() === hoy.toDateString()) {
      totalHoy += r.monto;

      cont.innerHTML += `
        <div class="item">
          <b>${r.cliente}</b><br>
          ${r.servicios.join(", ")}<br>
          $${r.monto}<br>
          ${fecha.toLocaleTimeString()}
        </div>
      `;
    }

    // semana
    let diff = (hoy - fecha) / (1000 * 60 * 60 * 24);
    if (diff <= 7) totalSemana += r.monto;
  });

  document.getElementById("hoy").textContent = totalHoy;
  document.getElementById("semana").textContent = totalSemana;
});

// 📄 PDF
async function generarPDF() {
  const { jsPDF } = window.jspdf;

  let inicio = new Date(document.getElementById("fechaInicio").value);
  let fin = new Date(document.getElementById("fechaFin").value);

  let snapshot = await db.collection("cortes").get();

  let docPDF = new jsPDF();
  let y = 10;
  let total = 0;

  snapshot.forEach(doc => {
    let r = doc.data();
    let fecha = new Date(r.fecha);

    if (fecha >= inicio && fecha <= fin) {
      docPDF.text(`${r.cliente} - $${r.monto}`, 10, y);
      y += 10;
      total += r.monto;
    }
  });

  docPDF.text("TOTAL: $" + total, 10, y + 10);
  docPDF.save("reporte.pdf");
}

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
