<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King’s Barber</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {margin:0;font-family:Arial;background:#0b0b0b;color:#fff;}
header {background:#000;padding:15px;text-align:center;font-size:20px;font-weight:bold;}
.container {padding:15px;}
input, select {width:100%;padding:10px;margin:5px 0;}
button {width:100%;padding:15px;margin-top:10px;background:#00c853;border:none;font-weight:bold;}
.card {background:#1a1a1a;padding:10px;margin-top:10px;border-radius:8px;}
.hidden {display:none;}
</style>
</head>

<body>

<header>💈 King’s Barber</header>

<!-- LOGIN -->
<div id="login" class="container">
<h3>Login</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<!-- CORTES -->
<div class="card">
<h3>Registrar Corte</h3>
<input id="cliente" placeholder="Cliente">

<select id="servicio">
<option>Corte</option>
<option>Ceja y barba</option>
<option>Facial con corte</option>
<option>Corte especial</option>
</select>

<input id="monto" placeholder="Monto">
<button onclick="guardar()">Guardar</button>
</div>

<!-- CITAS -->
<div class="card">
<h3>Agendar Cita</h3>
<input id="clienteCita" placeholder="Cliente">
<input id="fechaCita" type="datetime-local">
<button onclick="agendar()">Agendar</button>
</div>

<!-- LISTA CITAS -->
<div class="card">
<h3>Historial de Citas</h3>
<div id="listaCitas"></div>
</div>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCSF7dc0cy3B-hSaFTYAwU-gNc0o12JTG0",
  authDomain: "barberia-pro-3ca72.firebaseapp.com",
  projectId: "barberia-pro-3ca72",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let rol = "";

// LOGIN
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    rol="admin";
  }else if(u==="barbero" && p==="1234"){
    rol="barbero";
  }else{
    alert("Error");
    return;
  }

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  escucharCitas();
}

// GUARDAR CORTE
async function guardar(){
  let cliente = document.getElementById("cliente").value;
  let servicio = document.getElementById("servicio").value;
  let monto = parseFloat(document.getElementById("monto").value);

  if(!cliente || !monto){
    alert("Completa datos");
    return;
  }

  await db.collection("cortes").add({
    cliente,
    servicio,
    monto,
    fecha: new Date().toISOString()
  });

  alert("Guardado");
}

// AGENDAR
async function agendar(){
  let cliente = document.getElementById("clienteCita").value;
  let fecha = document.getElementById("fechaCita").value;

  if(!cliente || !fecha){
    alert("Completa datos");
    return;
  }

  await db.collection("citas").add({
    cliente,
    fecha,
    estado:"Pendiente"
  });
}

// ESCUCHAR CITAS (TIEMPO REAL)
function escucharCitas(){

  db.collection("citas").orderBy("fecha")
  .onSnapshot(snapshot=>{
    let cont = document.getElementById("listaCitas");
    cont.innerHTML="";

    snapshot.forEach(doc=>{
      let c = doc.data();

      cont.innerHTML+=`
        <div class="card">
          👤 ${c.cliente}<br>
          📅 ${new Date(c.fecha).toLocaleString()}<br>
          Estado: ${c.estado}<br>
          <button onclick="estado('${doc.id}','Llego')">Llegó</button>
          <button onclick="estado('${doc.id}','No llegó')">No llegó</button>
        </div>
      `;
    });
  });

}

// CAMBIAR ESTADO
async function estado(id, e){
  await db.collection("citas").doc(id).update({
    estado:e
  });
}

</script>

</body>
</html>
