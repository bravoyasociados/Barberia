<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King’s Barber</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#0b0b0b;color:#fff;}
header {background:#000;padding:15px;text-align:center;font-size:20px;font-weight:bold;}
.container {padding:15px;}
input {width:100%;padding:10px;margin:5px 0;}
button {width:100%;padding:15px;margin-top:10px;background:#00c853;border:none;font-weight:bold;}
.services {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.service-btn {padding:15px;background:#1c1c1c;text-align:center;border-radius:8px;cursor:pointer;}
.service-btn.active {background:#00c853;color:#000;}
.card {background:#1a1a1a;padding:10px;margin-top:10px;border-radius:8px;}
.hidden {display:none;}
.logo {display:block;margin:40px auto;width:150px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="pantallaLogin" class="container">
<img src="icono-192.png" class="logo">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<header>💈 King’s Barber</header>

<div class="card">
<h3>Registrar Corte</h3>
<input id="cliente">

<div class="services">
<div class="service-btn" onclick="toggle(this,'Corte',100)">Corte</div>
<div class="service-btn" onclick="toggle(this,'Barba',20)">Barba</div>
</div>

<input id="monto">
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h3>Citas</h3>
<input id="clienteCita">
<input id="telefonoCita">
<input id="fechaCita" type="datetime-local">
<button onclick="agendar()">Agendar</button>
</div>

<div id="listaCitas"></div>

<div id="reportes" class="card hidden">
<input id="fechaInicio" type="date">
<input id="fechaFin" type="date">
<button onclick="generarPDF()">PDF</button>
</div>

</div>

<script>

// 🔥 PON AQUÍ TU CONFIG REAL (NO RECORTADA)
const firebaseConfig = {
  apiKey: "TU_API_KEY_REAL",
  authDomain: "barberia-pro-3ca72.firebaseapp.com",
  projectId: "barberia-pro-3ca72",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let seleccionados = [];
let totalAuto = 0;

// LOGIN
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    document.getElementById("reportes").classList.remove("hidden");
  } else if(!(u==="barbero" && p==="1234")){
    alert("Error");
    return;
  }

  document.getElementById("pantallaLogin").style.display="none";
  document.getElementById("app").classList.remove("hidden");

  escuchar();
}

// SERVICIOS
function toggle(el,s,p){
  el.classList.toggle("active");

  if(seleccionados.includes(s)){
    seleccionados = seleccionados.filter(x=>x!==s);
    totalAuto -= p;
  }else{
    seleccionados.push(s);
    totalAuto += p;
  }

  document.getElementById("monto").value = totalAuto;
}

// GUARDAR
async function guardar(){
  await db.collection("cortes").add({
    cliente: document.getElementById("cliente").value,
    servicios: seleccionados,
    monto: parseFloat(document.getElementById("monto").value),
    fecha: new Date().toISOString()
  });
}

// ESCUCHAR
function escuchar(){
  db.collection("citas").onSnapshot(snap=>{
    let cont = document.getElementById("listaCitas");
    cont.innerHTML="";
    snap.forEach(doc=>{
      let c = doc.data();
      cont.innerHTML += `<div>${c.cliente} - ${c.estado}</div>`;
    });
  });
}

// AGENDAR
async function agendar(){

  let cliente = document.getElementById("clienteCita").value;
  let telefono = document.getElementById("telefonoCita").value;
  let fecha = document.getElementById("fechaCita").value;

  if(!cliente || !telefono || !fecha){
    alert("Completa datos");
    return;
  }

  await db.collection("citas").add({
    cliente,
    telefono,
    fecha,
    estado:"Pendiente"
  });

  alert("Guardado ✅");
}

// PDF
async function generarPDF(){

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let inicio = new Date(document.getElementById("fechaInicio").value+"T00:00:00");
  let fin = new Date(document.getElementById("fechaFin").value+"T23:59:59");

  let snap = await db.collection("cortes").get();

  let y=20;

  snap.forEach(d=>{
    let r=d.data();
    let f=new Date(r.fecha);

    if(f>=inicio && f<=fin){
      doc.text(r.cliente,10,y);
      y+=6;
    }
  });

  doc.save("reporte.pdf");
}

</script>

</body>
</html>
