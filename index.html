<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King’s Barber</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#0b0b0b;color:#fff;}
header {background:#000;padding:15px;text-align:center;font-size:20px;font-weight:bold;}
.container {padding:15px;}
input {width:100%;padding:10px;margin:5px 0;}
.services {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.service-btn {padding:15px;background:#1c1c1c;text-align:center;border-radius:8px;cursor:pointer;}
.service-btn.active {background:#d4af37;color:#000;}
button {width:100%;padding:15px;margin-top:10px;background:#d4af37;border:none;font-weight:bold;}
.item {background:#1a1a1a;padding:10px;margin-top:10px;border-radius:8px;}
</style>
</head>

<body>

<header>💈 King’s Barber</header>

<div class="container">

<input type="text" id="cliente" placeholder="Nombre del cliente">

<div class="services">
  <div class="service-btn" onclick="toggle(this,'Corte',100)">Corte $100</div>
  <div class="service-btn" onclick="toggle(this,'Ceja y barba',20)">Ceja y barba $20</div>
  <div class="service-btn" onclick="toggle(this,'Facial con corte',150)">Facial con corte $150</div>
  <div class="service-btn" onclick="toggle(this,'Corte especial',150)">Corte especial $150</div>
</div>

<input type="number" id="monto" placeholder="Total">

<button onclick="guardar()">Guardar Servicio</button>

<div>
💰 Hoy: $<span id="hoy">0</span><br>
📅 Semana: $<span id="semana">0</span>
</div>

<div>
<h3>📄 Reporte</h3>
<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">
<button onclick="generarPDF()">Generar PDF</button>
</div>

<div id="historial"></div>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCSF7dc0cy3B-hSaFTYAwU-gNc0o12JTG0",
  authDomain: "barberia-pro-3ca72.firebaseapp.com",
  projectId: "barberia-pro-3ca72",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// VARIABLES
let seleccionados = [];
let totalAuto = 0;

// 🔒 SOLO UN SERVICIO
function toggle(el, servicio, precio) {

  document.querySelectorAll(".service-btn")
    .forEach(btn => btn.classList.remove("active"));

  el.classList.add("active");

  seleccionados = [servicio];
  totalAuto = precio;

  document.getElementById("monto").value = totalAuto;
}

// 🔥 GUARDAR
async function guardar() {
  try {
    let cliente = document.getElementById("cliente").value;
    let monto = document.getElementById("monto").value;

    if (!cliente || seleccionados.length === 0 || !monto) {
      alert("Completa los datos");
      return;
    }

    await db.collection("cortes").add({
      cliente,
      servicios: [...seleccionados],
      monto: parseFloat(monto),
      fecha: new Date().toISOString()
    });

    alert("Guardado correctamente ✅");

    document.getElementById("cliente").value = "";
    document.getElementById("monto").value = "";
    seleccionados = [];
    totalAuto = 0;

    document.querySelectorAll(".service-btn")
      .forEach(btn => btn.classList.remove("active"));

  } catch (error) {
    console.error(error);
    alert("Error al guardar ❌");
  }
}

// 🔄 TIEMPO REAL
db.collection("cortes").orderBy("fecha")
.onSnapshot(snapshot => {

  let hoy = new Date();
  let totalHoy = 0;
  let totalSemana = 0;

  let cont = document.getElementById("historial");
  cont.innerHTML = "";

  snapshot.forEach(doc => {
    let r = doc.data();
    let fecha = new Date(r.fecha);

    if (fecha.toDateString() === hoy.toDateString()) {
      totalHoy += r.monto;

      cont.innerHTML += `
        <div class="item">
          <b>${r.cliente}</b><br>
          ${r.servicios.join(", ")}<br>
          $${r.monto}<br>
          ${fecha.toLocaleTimeString()}
        </div>
      `;
    }

    let diff = (hoy - fecha)/(1000*60*60*24);
    if (diff <= 7) totalSemana += r.monto;
  });

  document.getElementById("hoy").textContent = totalHoy;
  document.getElementById("semana").textContent = totalSemana;
});

// 📄 PDF PROFESIONAL CON CORTE DIARIO
async function generarPDF() {
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let inicio = new Date(document.getElementById("fechaInicio").value);
  let fin = new Date(document.getElementById("fechaFin").value);

  let snapshot = await db.collection("cortes").orderBy("fecha").get();

  let registros = [];

  snapshot.forEach(docSnap => {
    let r = docSnap.data();
    let fecha = new Date(r.fecha);

    if (fecha >= inicio && fecha <= fin) {
      registros.push({...r, fechaObj: fecha});
    }
  });

  let y = 40;
  let totalGeneral = 0;

  let img = new Image();
  img.src = "icono-192.png";
  await new Promise(resolve => img.onload = resolve);

  doc.addImage(img, "PNG", 10, 10, 20, 20);
  doc.setFontSize(16);
  doc.text("King’s Barber - Reporte", 40, 20);

  let fechaActual = "";
  let totalDia = 0;

  registros.forEach(r => {
    let fechaStr = r.fechaObj.toLocaleDateString();

    if (fechaStr !== fechaActual) {

      if (fechaActual !== "") {
        y += 5;
        doc.text("TOTAL DEL DÍA: $" + totalDia, 10, y);
        y += 10;
        totalDia = 0;
      }

      fechaActual = fechaStr;

      doc.text("📅 " + fechaActual, 10, y);
      y += 5;

      doc.text("Hora", 10, y);
      doc.text("Cliente", 35, y);
      doc.text("Servicio", 90, y);
      doc.text("Monto", 160, y);
      y += 5;
    }

    doc.text(r.fechaObj.toLocaleTimeString(), 10, y);
    doc.text(r.cliente, 35, y);
    doc.text(r.servicios.join(","), 90, y);
    doc.text("$"+r.monto, 160, y);

    totalDia += r.monto;
    totalGeneral += r.monto;

    y += 8;

    if (y > 270) {
      doc.addPage();
      y = 20;
    }
  });

  y += 5;
  doc.text("TOTAL DEL DÍA: $" + totalDia, 10, y);

  y += 15;
  doc.setFontSize(14);
  doc.text("TOTAL GENERAL: $" + totalGeneral, 10, y);

  doc.save("reporte-barberia.pdf");
}

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
