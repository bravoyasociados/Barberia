<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King's Barber</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: #fff;
}
header {
  background: #000;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container { padding: 15px; }
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}
.services {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.service-btn {
  padding: 15px;
  border-radius: 10px;
  background: #1c1c1c;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
}
.service-btn.active {
  border: 2px solid #00c853;
  background: #263238;
}
button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #00c853;
  color: #000;
  font-weight: bold;
}
.summary {
  background: #121212;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}
.item {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>💈 King's Barber</header>

<div class="container">

<input type="text" id="cliente" placeholder="Nombre del cliente">

<div class="services">
  <div class="service-btn" onclick="toggle(this,'Corte',100)">Corte</div>
  <div class="service-btn" onclick="toggle(this,'Ceja y barba',20)">Ceja y barba</div>
  <div class="service-btn" onclick="toggle(this,'Facial con corte',150)">Facial con corte</div>
  <div class="service-btn" onclick="toggle(this,'Corte especial',150)">Corte especial</div>
</div>

<input type="number" id="monto" placeholder="Total">

<button onclick="guardar()">Guardar Servicio</button>

<div class="summary">
  💰 Hoy: $<span id="hoy">0</span><br>
  📅 Semana: $<span id="semana">0</span>
</div>

<div class="summary">
  <h3>📄 Reporte</h3>
  <input type="date" id="fechaInicio">
  <input type="date" id="fechaFin">
  <button onclick="generarPDF()">Generar PDF</button>
</div>

<div id="historial"></div>

</div>

<script>
let seleccionados = [];
let totalAuto = 0;

// TOGGLE
function toggle(el, servicio, precio) {
  el.classList.toggle("active");

  if (seleccionados.includes(servicio)) {
    seleccionados = seleccionados.filter(s => s !== servicio);
    totalAuto -= precio;
  } else {
    seleccionados.push(servicio);
    totalAuto += precio;
  }

  document.getElementById("monto").value = totalAuto;
}

// GUARDAR
function guardar() {
  let cliente = document.getElementById("cliente").value.trim();
  let monto = parseFloat(document.getElementById("monto").value);

  if (!cliente || seleccionados.length === 0 || isNaN(monto)) {
    alert("Completa todos los datos");
    return;
  }

  let registros = JSON.parse(localStorage.getItem("cortes")) || [];

  registros.push({
    cliente,
    servicios: [...seleccionados],
    monto,
    fecha: new Date().toISOString()
  });

  localStorage.setItem("cortes", JSON.stringify(registros));

  document.getElementById("cliente").value = "";
  document.getElementById("monto").value = "";
  seleccionados = [];
  totalAuto = 0;

  document.querySelectorAll(".service-btn")
    .forEach(btn => btn.classList.remove("active"));

  cargar();
}

// UTILIDADES
function mismoDia(f1, f2) {
  return f1.toDateString() === f2.toDateString();
}

function mismaSemana(f1, f2) {
  let oneJan = new Date(f1.getFullYear(),0,1);
  let w1 = Math.ceil((((f1 - oneJan) / 86400000) + oneJan.getDay()+1)/7);
  let w2 = Math.ceil((((f2 - oneJan) / 86400000) + oneJan.getDay()+1)/7);
  return w1 === w2 && f1.getFullYear() === f2.getFullYear();
}

// CARGAR HISTORIAL
function cargar() {
  let registros = JSON.parse(localStorage.getItem("cortes")) || [];

  let hoy = new Date();
  let totalHoy = 0;
  let totalSemana = 0;

  let cont = document.getElementById("historial");
  cont.innerHTML = "";

  registros.slice().reverse().forEach(r => {
    let fecha = new Date(r.fecha);

    if (mismoDia(fecha, hoy)) totalHoy += r.monto;
    if (mismaSemana(fecha, hoy)) totalSemana += r.monto;

    if (!mismoDia(fecha, hoy)) return;

    cont.innerHTML += `
      <div class="item">
        <b>${r.cliente}</b><br>
        💈 ${r.servicios.join(", ")}<br>
        💰 $${r.monto}<br>
        ⏰ ${fecha.toLocaleTimeString()}
      </div>
    `;
  });

  document.getElementById("hoy").textContent = totalHoy;
  document.getElementById("semana").textContent = totalSemana;
}

// PDF CORREGIDO
async function generarPDF() {
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let registros = JSON.parse(localStorage.getItem("cortes")) || [];

  let inicio = document.getElementById("fechaInicio").value;
  let fin = document.getElementById("fechaFin").value;

  if (!inicio || !fin) {
    alert("Selecciona fechas");
    return;
  }

  inicio = new Date(inicio + "T00:00:00");
  fin = new Date(fin + "T23:59:59");

  let filtrados = registros.filter(r => {
    let f = new Date(r.fecha);
    return f >= inicio && f <= fin;
  });

  let y = 20;
  let total = 0;

  // LOGO (opcional)
  try {
    let img = new Image();
    img.src = "logo.png";
    await new Promise(res => { img.onload = res; img.onerror = res; });
    doc.addImage(img, "PNG", 10, 5, 25, 25);
  } catch(e) {}

  doc.setFontSize(18);
  doc.text("King's Barber", 40, 15);

  doc.setFontSize(12);
  doc.text("Reporte de Servicios", 40, 22);

  doc.setFontSize(10);
  doc.text(`Periodo: ${inicio.toLocaleDateString()} - ${fin.toLocaleDateString()}`, 10, 35);

  y = 45;

  filtrados.forEach(r => {
    let fecha = new Date(r.fecha);

    doc.text(`${fecha.toLocaleDateString()} ${fecha.toLocaleTimeString()}`, 10, y);
    y += 5;

    doc.text(`Cliente: ${r.cliente}`, 10, y);
    y += 5;

    doc.text(`Servicios: ${r.servicios.join(", ")}`, 10, y);
    y += 5;

    doc.text(`Monto: $${r.monto}`, 10, y);
    y += 10;

    total += r.monto;

    if (y > 270) {
      doc.addPage();
      y = 20;
    }
  });

  doc.setFontSize(14);
  doc.text(`TOTAL: $${total}`, 10, y + 10);

  doc.save("reporte-barberia.pdf");
}

// INIT
cargar();
</script>

</body>
</html>
