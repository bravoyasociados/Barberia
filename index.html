<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King’s Barber</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#0b0b0b;color:#fff;}
header {background:#000;padding:15px;text-align:center;font-size:20px;font-weight:bold;}
.container {padding:15px;}
input, select {width:100%;padding:10px;margin:5px 0;}
button {width:100%;padding:15px;margin-top:10px;background:#00c853;border:none;font-weight:bold;}
.services {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.service-btn {padding:15px;background:#1c1c1c;text-align:center;border-radius:8px;cursor:pointer;}
.service-btn.active {background:#00c853;color:#000;}
.card {background:#1a1a1a;padding:10px;margin-top:10px;border-radius:8px;}
.hidden {display:none;}
</style>
</head>

<body>

<header>💈 King’s Barber</header>

<!-- LOGIN -->
<div id="login" class="container">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<!-- CORTES -->
<div class="card">
<h3>Registrar Corte</h3>
<input id="cliente" placeholder="Cliente">

<div class="services">
<div class="service-btn" onclick="toggle(this,'Corte',100)">Corte $100</div>
<div class="service-btn" onclick="toggle(this,'Ceja y barba',20)">Ceja y barba $20</div>
<div class="service-btn" onclick="toggle(this,'Facial con corte',150)">Facial $150</div>
<div class="service-btn" onclick="toggle(this,'Corte especial',150)">Especial $150</div>
</div>

<input id="monto" placeholder="Total">
<button onclick="guardar()">Guardar</button>
</div>

<!-- HISTORIAL CORTES -->
<div class="card">
<h3>Historial del día</h3>
<div id="historial"></div>
</div>

<!-- CITAS -->
<div class="card">
<h3>Agendar Cita</h3>
<input id="clienteCita" placeholder="Cliente">
<input id="fechaCita" type="datetime-local">
<button onclick="agendar()">Agendar</button>
</div>

<div class="card">
<h3>Historial de Citas</h3>
<div id="listaCitas"></div>
</div>

<!-- REPORTES (ADMIN) -->
<div id="reportes" class="card hidden">
<h3>📄 Reporte</h3>
<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">
<button onclick="generarPDF()">Generar PDF</button>
</div>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCSF7dc0cy3B-hSaFTYAwU-gNc0o12JTG0",
  authDomain: "barberia-pro-3ca72.firebaseapp.com",
  projectId: "barberia-pro-3ca72",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let rol = "";
let seleccionados = [];
let totalAuto = 0;

// LOGIN
function login(){
  let u = user.value;
  let p = pass.value;

  if(u==="admin" && p==="1234"){
    rol="admin";
    reportes.classList.remove("hidden");
  } else if(u==="barbero" && p==="1234"){
    rol="barbero";
  } else {
    alert("Error");
    return;
  }

  login.style.display="none";
  app.classList.remove("hidden");

  escuchar();
}

// MULTI SERVICIOS
function toggle(el, servicio, precio){
  el.classList.toggle("active");

  if(seleccionados.includes(servicio)){
    seleccionados = seleccionados.filter(s=>s!==servicio);
    totalAuto -= precio;
  }else{
    seleccionados.push(servicio);
    totalAuto += precio;
  }

  monto.value = totalAuto;
}

// GUARDAR CORTE
async function guardar(){
  if(!cliente.value || seleccionados.length===0){
    alert("Completa datos");
    return;
  }

  await db.collection("cortes").add({
    cliente: cliente.value,
    servicios: seleccionados,
    monto: parseFloat(monto.value),
    fecha: new Date().toISOString()
  });

  cliente.value="";
  monto.value="";
  seleccionados=[];
  totalAuto=0;

  document.querySelectorAll(".service-btn").forEach(b=>b.classList.remove("active"));
}

// ESCUCHAR DATOS
function escuchar(){

  db.collection("cortes").onSnapshot(snap=>{
    historial.innerHTML="";
    let hoy = new Date().toDateString();

    snap.forEach(doc=>{
      let d = doc.data();
      let f = new Date(d.fecha);

      if(f.toDateString()===hoy){
        historial.innerHTML += `
        <div class="card">
          ${d.cliente}<br>
          ${d.servicios.join(" + ")}<br>
          $${d.monto}<br>
          ${f.toLocaleString()}
        </div>`;
      }
    });
  });

  db.collection("citas").onSnapshot(snap=>{
    listaCitas.innerHTML="";
    snap.forEach(doc=>{
      let c = doc.data();
      listaCitas.innerHTML += `
      <div class="card">
        ${c.cliente}<br>
        ${new Date(c.fecha).toLocaleString()}<br>
        ${c.estado}<br>
        <button onclick="estado('${doc.id}','Llego')">Llegó</button>
        <button onclick="estado('${doc.id}','No llegó')">No llegó</button>
      </div>`;
    });
  });

}

// CITAS
async function agendar(){
  await db.collection("citas").add({
    cliente: clienteCita.value,
    fecha: fechaCita.value,
    estado:"Pendiente"
  });
}

async function estado(id,e){
  await db.collection("citas").doc(id).update({estado:e});
}

// PDF
async function generarPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let inicio = new Date(fechaInicio.value+"T00:00:00");
  let fin = new Date(fechaFin.value+"T23:59:59");

  let snap = await db.collection("cortes").get();

  let y=20;
  doc.text("King’s Barber Reporte",10,y);
  y+=10;

  snap.forEach(docSnap=>{
    let r=docSnap.data();
    let f=new Date(r.fecha);

    if(f>=inicio && f<=fin){
      doc.text(`${f.toLocaleString()} | ${r.cliente} | ${r.servicios.join(" + ")} | $${r.monto}`,10,y);
      y+=6;
    }
  });

  doc.save("reporte.pdf");
}

</script>

</body>
</html>
