<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King’s Barber PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {font-family:Arial;background:#0b0b0b;color:#fff;}
.hidden {display:none;}
button {background:#00c853;color:#000;padding:10px;margin:5px;border:none;}
input, select {padding:10px;margin:5px;width:90%;}
.card {background:#1a1a1a;padding:10px;margin:10px;border-radius:8px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>💈 King’s Barber</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h2>Panel</h2>

<!-- CORTES -->
<div class="card">
<h3>Registrar Corte</h3>
<input id="cliente" placeholder="Cliente">

<select id="servicio">
<option>Corte</option>
<option>Ceja y barba</option>
<option>Facial con corte</option>
<option>Corte especial</option>
</select>

<input id="monto" placeholder="Monto">
<button onclick="guardar()">Guardar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">
<h3>Dashboard</h3>
<canvas id="grafica"></canvas>
</div>

<!-- CITAS -->
<div class="card">
<h3>Citas</h3>
<input id="clienteCita" placeholder="Cliente">
<input id="fechaCita" type="datetime-local">
<button onclick="agendar()">Agendar</button>

<div id="listaCitas"></div>
</div>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCSF7dc0cy3B-hSaFTYAwU-gNc0o12JTG0",
  authDomain: "barberia-pro-3ca72.firebaseapp.com",
  projectId: "barberia-pro-3ca72",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let rol = "";
let chart;

// LOGIN
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    rol="admin";
  }else if(u==="barbero" && p==="1234"){
    rol="barbero";
  }else{
    alert("Error");
    return;
  }

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  if(rol==="admin"){
    document.getElementById("dashboard").classList.remove("hidden");
  }

  escucharDatos();
}

// GUARDAR CORTE
async function guardar(){
  let cliente = document.getElementById("cliente").value;
  let servicio = document.getElementById("servicio").value;
  let monto = parseFloat(document.getElementById("monto").value);

  if(!cliente || !monto){
    alert("Completa datos");
    return;
  }

  await db.collection("cortes").add({
    cliente,
    servicio,
    monto,
    fecha: new Date().toISOString()
  });

  alert("Guardado");
}

// 🔄 ESCUCHAR EN TIEMPO REAL
function escucharDatos(){

  // CORTES
  db.collection("cortes").onSnapshot(snapshot => {

    let ingresos = {};

    snapshot.forEach(doc=>{
      let c = doc.data();
      let d = new Date(c.fecha).toLocaleDateString();
      ingresos[d] = (ingresos[d]||0)+c.monto;
    });

    if(rol==="admin"){
      renderGrafica(ingresos);
    }

  });

  // CITAS
  db.collection("citas").onSnapshot(snapshot=>{
    let cont = document.getElementById("listaCitas");
    cont.innerHTML="";

    snapshot.forEach(doc=>{
      let c = doc.data();

      cont.innerHTML+=`
        <div class="card">
          ${c.cliente} - ${c.fecha}<br>
          Estado: ${c.estado}<br>
          <button onclick="estado('${doc.id}','Llego')">Llegó</button>
          <button onclick="estado('${doc.id}','No llegó')">No llegó</button>
        </div>
      `;
    });
  });

}

// 📊 GRAFICA
function renderGrafica(data){

  let labels = Object.keys(data);
  let values = Object.values(data);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafica"),{
    type:"bar",
    data:{
      labels,
      datasets:[{
        label:"Ingresos",
        data:values
      }]
    }
  });
}

// CITAS
async function agendar(){
  let cliente = document.getElementById("clienteCita").value;
  let fecha = document.getElementById("fechaCita").value;

  if(!cliente || !fecha){
    alert("Completa datos");
    return;
  }

  await db.collection("citas").add({
    cliente,
    fecha,
    estado:"Pendiente"
  });
}

// ESTADO CITA
async function estado(id, e){
  await db.collection("citas").doc(id).update({
    estado:e
  });
}

</script>

</body>
</html>
