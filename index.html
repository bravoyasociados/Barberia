<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King’s Barber</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#0b0b0b;color:#fff;}
header {background:#000;padding:15px;text-align:center;font-size:20px;font-weight:bold;}
.container {padding:15px;}
input {width:100%;padding:10px;margin:5px 0;}
button {width:100%;padding:15px;margin-top:10px;background:#00c853;border:none;font-weight:bold;}
.card {background:#1a1a1a;padding:10px;margin-top:10px;border-radius:8px;}
.services {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.service-btn {padding:15px;background:#1c1c1c;text-align:center;border-radius:8px;cursor:pointer;}
.service-btn.active {background:#00c853;color:#000;}
.hidden {display:none;}
.logo {display:block;margin:40px auto;width:150px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="pantallaLogin" class="container">
<img src="icono-192.png" class="logo">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<header>💈 King’s Barber</header>

<!-- CORTES -->
<div class="card">
<h3>Registrar Corte</h3>
<input id="cliente" placeholder="Cliente">

<div class="services">
<div class="service-btn" onclick="toggle(this,'Corte',100)">Corte $100</div>
<div class="service-btn" onclick="toggle(this,'Ceja y barba',20)">Ceja y barba $20</div>
<div class="service-btn" onclick="toggle(this,'Facial con corte',150)">Facial $150</div>
<div class="service-btn" onclick="toggle(this,'Corte especial',150)">Especial $150</div>
</div>

<input id="monto" placeholder="Total">
<button onclick="guardar()">Guardar</button>
</div>

<!-- HISTORIAL -->
<div class="card">
<h3>Historial</h3>
<div id="historial"></div>
</div>

<!-- CITAS -->
<div class="card">
<h3>Agendar Cita</h3>
<input id="clienteCita" placeholder="Nombre">
<input id="telefonoCita" placeholder="WhatsApp">
<input id="fechaCita" type="datetime-local">
<button onclick="agendar()">Agendar</button>
</div>

<div class="card">
<h3>Historial de Citas</h3>
<div id="listaCitas"></div>
</div>

<!-- PDF -->
<div id="reportes" class="card hidden">
<input id="fechaInicio" type="date">
<input id="fechaFin" type="date">
<button onclick="generarPDF()">Generar PDF</button>
</div>

</div>

<script>

// 🔥 FIREBASE CONFIG (YA CORRECTO)
const firebaseConfig = {
  apiKey: "AIzaSyCSF7dc0cy3B-hSaFTYAwU-gNc0o12JTG0",
  authDomain: "barberia-pro-3ca72.firebaseapp.com",
  projectId: "barberia-pro-3ca72",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let seleccionados = [];
let totalAuto = 0;

// LOGIN
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    document.getElementById("reportes").classList.remove("hidden");
  } else if(!(u==="barbero" && p==="1234")){
    alert("Usuario incorrecto");
    return;
  }

  document.getElementById("pantallaLogin").style.display="none";
  document.getElementById("app").classList.remove("hidden");

  escuchar();
}

// SERVICIOS
function toggle(el,s,p){
  el.classList.toggle("active");

  if(seleccionados.includes(s)){
    seleccionados = seleccionados.filter(x=>x!==s);
    totalAuto -= p;
  }else{
    seleccionados.push(s);
    totalAuto += p;
  }

  document.getElementById("monto").value = totalAuto;
}

// GUARDAR CORTE
async function guardar(){

  let cliente = document.getElementById("cliente").value;
  let monto = document.getElementById("monto").value;

  if(!cliente || seleccionados.length===0){
    alert("Completa datos");
    return;
  }

  await db.collection("cortes").add({
    cliente,
    servicios:[...seleccionados],
    monto:parseFloat(monto),
    fecha:new Date().toISOString()
  });

  document.getElementById("cliente").value="";
  document.getElementById("monto").value="";
  seleccionados=[];
  totalAuto=0;

  document.querySelectorAll(".service-btn").forEach(b=>b.classList.remove("active"));
}

// HISTORIALES
function escuchar(){

  db.collection("cortes").orderBy("fecha","desc")
  .onSnapshot(snap=>{
    let cont = document.getElementById("historial");
    cont.innerHTML="";

    snap.forEach(doc=>{
      let d=doc.data();
      let f=new Date(d.fecha);

      cont.innerHTML+=`
      <div class="card">
      ${d.cliente}<br>
      ${d.servicios.join(" + ")}<br>
      $${d.monto}<br>
      ${f.toLocaleString()}
      </div>`;
    });
  });

  db.collection("citas").orderBy("fecha","desc")
  .onSnapshot(snap=>{
    let cont = document.getElementById("listaCitas");
    cont.innerHTML="";

    snap.forEach(doc=>{
      let c=doc.data();

      cont.innerHTML+=`
      <div class="card">
      ${c.cliente}<br>
      ${c.telefono}<br>
      ${new Date(c.fecha).toLocaleString()}<br>
      ${c.estado}
      </div>`;
    });
  });

}

// AGENDAR (YA FUNCIONA)
async function agendar(){

  let cliente=document.getElementById("clienteCita").value;
  let telefono=document.getElementById("telefonoCita").value;
  let fecha=document.getElementById("fechaCita").value;

  if(!cliente || !telefono || !fecha){
    alert("Completa datos");
    return;
  }

  let fechaISO=new Date(fecha).toISOString();

  await db.collection("citas").add({
    cliente,
    telefono,
    fecha:fechaISO,
    estado:"Pendiente"
  });

  alert("Cita guardada ✅");

  let inicio=new Date(fechaISO);
  let fin=new Date(inicio.getTime()+30*60000);

  let url="https://calendar.google.com/calendar/render?action=TEMPLATE"
  +"&text="+encodeURIComponent(cliente)
  +"&dates="+inicio.toISOString().replace(/-|:|\.\d+/g,"")+"/"+fin.toISOString().replace(/-|:|\.\d+/g,"");

  window.open(url,"_blank");

  document.getElementById("clienteCita").value="";
  document.getElementById("telefonoCita").value="";
  document.getElementById("fechaCita").value="";
}

// PDF FINAL
async function generarPDF(){

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let inicio = new Date(document.getElementById("fechaInicio").value+"T00:00:00");
  let fin = new Date(document.getElementById("fechaFin").value+"T23:59:59");

  let snap = await db.collection("cortes").get();

  let y=20,total=0;

  doc.text("King’s Barber Reporte",10,y);
  y+=10;

  snap.forEach(d=>{
    let r=d.data();
    let f=new Date(r.fecha);

    if(f>=inicio && f<=fin){
      doc.text(`${f.toLocaleString()} | ${r.cliente} | ${r.servicios.join(" + ")} | $${r.monto}`,10,y);
      total+=r.monto;
      y+=6;
    }
  });

  y+=10;
  doc.text("TOTAL: $"+total,10,y);

  doc.save("reporte.pdf");
}

</script>

</body>
</html>
